<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta e Inventario</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .badge { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Sistema de Inventario y Facturación</h1>

    <div class="container">
        
        <!-- FORMULARIO DE NUEVA FACTURA -->
        <div class="card">
            <h2>📝 Crear Factura (Venta)</h2>
            <form id="facturaForm">
                <label>Cliente:</label>
                <!-- En un sistema real, esto vendría de la colección 'entidades' -->
                <select id="clienteSelect" required>
                    <option value="CLI-001|Empresa ABC S.A.">Empresa ABC S.A.</option>
                    <option value="CLI-002|Juan Pérez">Juan Pérez</option>
                </select>

                <label>Producto a vender:</label>
                <select id="productoSelect" required>
                    <option value="">Cargando productos...</option>
                </select>

                <label>Cantidad:</label>
                <input type="number" id="cantidadInput" min="1" value="1" required>

                <button type="submit" id="btnGuardar">Generar Factura y Descontar Stock</button>
            </form>
            <p id="statusMsg" style="margin-top: 10px; font-weight: bold;"></p>
        </div>

        <!-- TABLA DE INVENTARIO ACTUAL -->
        <div class="card">
            <h2>📦 Inventario en Tiempo Real</h2>
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Stock Actual</th>
                    </tr>
                </thead>
                <tbody id="inventarioTableBody">
                    <tr><td colspan="3">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- SCRIPT DE FIREBASE Y LÓGICA -->
    <script type="module">
        // 1. Importar Firebase SDK (Versión Modular)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, writeBatch, increment, serverTimestamp, onSnapshot } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==============================================================================
        // ⚠️ REEMPLAZA ESTO CON LA CONFIGURACIÓN DE TU PROYECTO FIREBASE
        // ==============================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCGLhqCndD9zpSraPhYLAMul6jtvavcoek",
            authDomain: "inventario-49d3b.firebaseapp.com",
            projectId: "inventario-49d3b",
            storageBucket: "inventario-49d3b.firebasestorage.app",
            messagingSenderId: "837690492755",
            appId: "1:837690492755:web:9882ffec8433786556c3a6",
            measurementId: "G-HRH7SSM5ZB"
          };

        // 2. Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables globales para la UI
        const productoSelect = document.getElementById('productoSelect');
        const inventarioTableBody = document.getElementById('inventarioTableBody');
        const statusMsg = document.getElementById('statusMsg');
        let productosData = {}; // Para guardar los datos en memoria

        // 3. Escuchar el Inventario en Tiempo Real (Colección 'productos')
        // Usamos onSnapshot para que la tabla se actualice sola si el stock cambia
        onSnapshot(collection(db, "productos"), (snapshot) => {
            inventarioTableBody.innerHTML = '';
            productoSelect.innerHTML = '<option value="">Seleccione un producto...</option>';
            
            snapshot.forEach((docSnap) => {
                const prod = docSnap.data();
                productosData[docSnap.id] = prod; // Guardar en memoria
                
                // Llenar tabla
                const row = `<tr>
                    <td>${prod.nombre}</td>
                    <td>$${prod.precio_venta}</td>
                    <td>${prod.stock_actual} ${prod.stock_actual <= prod.stock_minimo ? '<span class="badge">Bajo</span>' : ''}</td>
                </tr>`;
                inventarioTableBody.innerHTML += row;

                // Llenar Select del formulario si hay stock
                if(prod.stock_actual > 0) {
                    const option = `<option value="${docSnap.id}">
                        ${prod.nombre} (Disp: ${prod.stock_actual}) - $${prod.precio_venta}
                    </option>`;
                    productoSelect.innerHTML += option;
                }
            });
        });

        // 4. LÓGICA PRINCIPAL: Guardar Factura y Actualizar Stock (BATCHED WRITE)
        document.getElementById('facturaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            statusMsg.style.color = "blue";
            statusMsg.innerText = "Procesando transacción...";

            try {
                // Obtener datos del formulario
                const clienteVal = document.getElementById('clienteSelect').value.split('|');
                const clienteId = clienteVal[0];
                const clienteNombre = clienteVal[1];
                
                const productoId = productoSelect.value;
                const cantidadVendida = parseInt(document.getElementById('cantidadInput').value);
                const productoRef = productosData[productoId];

                // Validar Stock
                if (cantidadVendida > productoRef.stock_actual) {
                    throw new Error("No hay suficiente stock para esta venta.");
                }

                const totalFactura = cantidadVendida * productoRef.precio_venta;

                // --- INICIO DE LA TRANSACCIÓN POR LOTES (BATCH) ---
                const batch = writeBatch(db);

                // A. Crear documento de la factura
                const nuevaFacturaRef = doc(collection(db, "facturas"));
                batch.set(nuevaFacturaRef, {
                    numero_factura: "F-" + Math.floor(Math.random() * 100000), // Simula un folio
                    tipo: "venta",
                    fecha: serverTimestamp(),
                    entidad_id: clienteId,
                    entidad_nombre: clienteNombre,
                    total: totalFactura,
                    estado: "pagada",
                    items: [{
                        producto_id: productoId,
                        codigo: productoRef.codigo_sku,
                        nombre: productoRef.nombre,
                        cantidad: cantidadVendida,
                        precio_unitario: productoRef.precio_venta,
                        total_item: totalFactura
                    }]
                });

                // B. Actualizar (Descontar) el stock del producto
                const prodDocRef = doc(db, "productos", productoId);
                batch.update(prodDocRef, {
                    stock_actual: increment(-cantidadVendida) // Resta la cantidad
                });

                // C. Crear registro de Movimiento de Inventario (Kardex)
                const nuevoMovimientoRef = doc(collection(db, "movimientos_inventario"));
                batch.set(nuevoMovimientoRef, {
                    producto_id: productoId,
                    tipo_movimiento: "salida",
                    cantidad: cantidadVendida,
                    fecha: serverTimestamp(),
                    referencia_id: nuevaFacturaRef.id,
                    motivo: `Venta según factura ${nuevaFacturaRef.id}`
                });

                // EJECUTAR TODAS LAS OPERACIONES JUNTAS
                await batch.commit();
                // --- FIN DE LA TRANSACCIÓN ---

                statusMsg.style.color = "green";
                statusMsg.innerText = "¡Factura generada y stock actualizado correctamente!";
                document.getElementById('facturaForm').reset();

            } catch (error) {
                console.error("Error en la transacción: ", error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Error: " + error.message;
            } finally {
                btn.disabled = false;
                setTimeout(() => statusMsg.innerText = "", 5000);
            }
        });
    </script>
</body>
</html>
