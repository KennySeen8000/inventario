<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Stock</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        input[type="number"] { max-width: 120px; }
        button { padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219653; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; font-size: 0.85em; }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Control de Inventario</h1>
    
    <!-- Formulario para añadir productos -->
    <form id="stock-form">
        <input type="text" id="prod-name" placeholder="Nombre del producto" required>
        <input type="number" id="prod-qty" placeholder="Cantidad" min="0" required>
        <button type="submit">Agregar</button>
    </form>

    <!-- Tabla de Stock -->
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="stock-table-body">
            <!-- Los productos se cargarán aquí dinámicamente -->
        </tbody>
    </table>
</div>

<!-- SDK de Firebase usando módulos CDN modernos (v10) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ REEMPLAZA ESTO CON TUS CREDENCIALES DE FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_AUTH_DOMAIN",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_STORAGE_BUCKET",
        messagingSenderId: "TU_MESSAGING_SENDER_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar Firebase y Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const stockCollection = collection(db, "inventario");

    // Elementos del DOM
    const form = document.getElementById('stock-form');
    const tableBody = document.getElementById('stock-table-body');

    // 1. Escuchar la base de datos en tiempo real
    onSnapshot(stockCollection, (snapshot) => {
        tableBody.innerHTML = ''; // Limpiar tabla
        snapshot.forEach((documento) => {
            const producto = documento.data();
            const id = documento.id;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${producto.nombre}</td>
                <td><strong>${producto.cantidad}</strong> unidades</td>
                <td><button class="btn-delete" data-id="${id}">Eliminar</button></td>
            `;
            tableBody.appendChild(row);
        });

        // Asignar eventos a los botones de eliminar creados dinámicamente
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const docId = e.target.getAttribute('data-id');
                await deleteDoc(doc(db, "inventario", docId));
            });
        });
    });

    // 2. Insertar un nuevo producto
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('prod-name').value;
        const cantidad = parseInt(document.getElementById('prod-qty').value);

        try {
            await addDoc(stockCollection, {
                nombre: nombre,
                cantidad: cantidad,
                fechaCreacion: new Date()
            });
            form.reset(); // Limpiar formulario
        } catch (error) {
            console.error("Error al añadir producto: ", error);
        }
    });
</script>

</body>
</html>
